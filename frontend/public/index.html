<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepfake Detection System</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0 0 1rem 0;
      color: #3b82f6;
    }
    .status-box {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #3b82f6;
      padding: 1.5rem;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      text-align: left;
      flex: 1;
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-left: 1rem;
    }
    .badge-success {
      background: #10b981;
      color: white;
    }
    .badge-error {
      background: #ef4444;
      color: white;
    }
    .badge-pending {
      background: #f59e0b;
      color: white;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #app {
      margin-top: 2rem;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .info-text {
      color: #d1d5db;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Deepfake Detection System</h1>
    <p class="info-text">Initializing...</p>
    
    <div class="status-box">
      <div class="status-item">
        <div class="status-label">Frontend Server</div>
        <div class="status-badge badge-success">✓ Running</div>
      </div>
      <div class="status-item">
        <div class="status-label">Backend API</div>
        <div class="status-badge badge-pending" id="backend-status">
          <span class="loading"></span> Checking...
        </div>
      </div>
      <div class="status-item">
        <div class="status-label">React App</div>
        <div class="status-badge badge-pending" id="react-status">
          <span class="loading"></span> Loading...
        </div>
      </div>
    </div>

    <div id="app" class="app-loading">
      <div class="loading"></div>
      <p>Loading React application...</p>
    </div>
  </div>

  <script>
    // Check backend API
    fetch('http://localhost:5000/health')
      .then(res => res.json())
      .then(data => {
        document.getElementById('backend-status').innerHTML = '✓ Running';
        document.getElementById('backend-status').className = 'status-badge badge-success';
      })
      .catch(err => {
        console.error('Backend check failed:', err);
        document.getElementById('backend-status').innerHTML = '✗ Offline';
        document.getElementById('backend-status').className = 'status-badge badge-error';
      });
  </script>

  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
